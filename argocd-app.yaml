# PARTE 1: Definição da Aplicação com o Gatilho Oficial da Datadog
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-app
  namespace: argocd
  annotations:
    # Esta anotação vincula a App ao trigger 'cd-visibility-trigger' que criamos no ConfigMap
    notifications.argoproj.io/subscribe.cd-visibility-trigger.cd-visibility-webhook: ""
spec:
  project: default
  source:
    repoURL: 'https://github.com/nicolascosta-dev/labs-gitops.git'
    targetRevision: HEAD
    path: k8s 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# PARTE 2: Patch do Service para Coleta de Métricas DORA (OpenMetrics)
apiVersion: v1
kind: Service
metadata:
  name: argocd-application-controller
  namespace: argocd
  annotations:
    # O Agent do Datadog detecta estas anotações e começa a ler os dados do ArgoCD
    ad.datadoghq.com/argocd-application-controller.check_names: '["openmetrics"]'
    ad.datadoghq.com/argocd-application-controller.init_configs: '[{}]'
    ad.datadoghq.com/argocd-application-controller.instances: |
      [
        {
          "openmetrics_endpoint": "http://%%host%%:8082/metrics",
          "namespace": "argocd",
          "metrics": [
            "argocd_app_info",
            "argocd_app_sync_status",
            "argocd_app_health_status",
            "argocd_cluster_api_resource_objects"
          ]
        }
      ]
spec:
  selector:
    app.kubernetes.io/name: argocd-application-controller
  ports:
  - name: metrics
    port: 8082
    targetPort: 8082